<div class="sidebar-detalle">
  <div class="detalle-header">
    <p class="detalle-label">Mesa seleccionada</p>
    <h2>Mesa {{ mesa.id }}</h2>
  </div>

  <div class="detalle-info">
    <p><strong>Capacidad:</strong> {{ mesa.capacidad }} pax</p>
    <p><strong>Estado:</strong> {{ mesa.estado === 'ocupada' ? 'Ocupada' : 'Libre' }}</p>

    @if (mesa.cuentaActivaId) {
      <p><strong>Cuenta activa:</strong> {{ mesa.cuentaActivaId }}</p>
    } @else {
      <p><strong>Cuenta activa:</strong> ninguna</p>
    }
  </div>

  <div class="detalle-acciones">
    @if (mesa.estado === 'libre') {
      <button type="button" (click)="ocupar.emit(mesa.id)" [disabled]="accionEnCurso">
        Ocupar mesa
      </button>
    } @else {
      <button type="button" (click)="liberar.emit(mesa.id)" [disabled]="accionEnCurso">
        Liberar mesa
      </button>
    }
  </div>
</div>
