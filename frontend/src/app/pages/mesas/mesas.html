<div class="mesas-page">
  <div class="mesas-topbar">
    <div class="tabs-zona">
      <button
        type="button"
        [class.active]="zona() === 'interior'"
        (click)="cambiarZona('interior')">
        Interior
      </button>

      <button
        type="button"
        [class.active]="zona() === 'terraza'"
        (click)="cambiarZona('terraza')">
        Terraza
      </button>
    </div>

    <div class="mesas-topbar-right">
      <button type="button" class="edit-btn" disabled>Editar</button>

      <div class="estado-legend">
        <span class="legend-item">
          <span class="legend-dot legend-dot--ocupada"></span>
          Ocupado
        </span>

        <span class="legend-item">
          <span class="legend-dot legend-dot--reservada"></span>
          Reservado
        </span>

        <span class="legend-item">
          <span class="legend-dot legend-dot--libre"></span>
          Libre
        </span>
      </div>
    </div>
  </div>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  @if (cargando()) {
    <p>Cargando mesas...</p>
  } @else {
    <div class="mesas-layout">
      <section class="grid-mesas">
        @for (mesa of mesasActuales(); track mesa.id) {
          <div (click)="seleccionar(mesa)">
            <app-mesa-card
              [numero]="mesa.id"
              [capacidad]="mesa.capacidad"
              [estado]="mesa.estado"
              [seleccionada]="mesaSeleccionada()?.id === mesa.id">
            </app-mesa-card>
          </div>
        }
      </section>

      @if (mesaSeleccionada(); as mesaSel) {
        <aside class="detalle-columna">
          <app-mesa-detalle
            [mesa]="mesaSel"
            [accionEnCurso]="accionMesaId() === mesaSel.id"
            (ocupar)="ocuparMesa($event)"
            (liberar)="liberarMesa($event)">
          </app-mesa-detalle>
        </aside>
      }
    </div>
  }
</div>
