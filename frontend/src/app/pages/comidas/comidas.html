<div class="bebidas-page">
  <div class="header-bebidas">
    <h1>Cola de Comidas</h1>
    <div class="contador-pendientes">
      <span class="dot rojo"></span> {{ pendientesCount() }} Pendientes
    </div>
  </div>

  <div class="lista-pedidos">
    @for (pedido of pedidosOrdenados(); track pedido.id) {
      <app-tarjeta-pedido
        [pedido]="pedido"
        [ocultarCantidad]="true" (avanzar)="avanzarEstado($event)"
        (retroceder)="retrocederEstado($event)">
      </app-tarjeta-pedido>
    }
  </div>
</div>
